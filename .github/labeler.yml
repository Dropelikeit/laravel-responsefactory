# ============================================================
# Project Area Labels
# ============================================================
"area:tests":
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/**'
          - 'phpunit.xml.dist'
          - 'infection.json5'

"area:docs":
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '**/*.md'
          - 'LICENSE'

"area:config":
  - changed-files:
      - any-glob-to-any-file: 'config/**'

"area:ci":
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - '.php-cs-fixer*'
          - 'psalm.xml'

"area:dependencies":
  - changed-files:
      - any-glob-to-any-file:
          - 'composer.json'
          - 'composer.lock'

"area:release":
  - changed-files:
      - any-glob-to-any-file:
          - 'release-please-config.json'
          - '.release-please-manifest.json'
          - 'version.txt'

